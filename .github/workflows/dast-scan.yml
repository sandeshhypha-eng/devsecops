name: DAST Scan - OWASP ZAP

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: 'Test Environment URL (e.g., http://test.example.com)'
        required: true
        type: string

  workflow_run:
    workflows: ['SCA Scan - Dependency Vulnerability Analysis', 'SAST Scan - Static Application Security Testing']
    types: [completed]
    branches: [main, develop, 'feature*']

jobs:
  deploy-to-test:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    outputs:
      test_url: ${{ steps.deploy.outputs.test_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Test Environment URL
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TEST_URL="${{ github.event.inputs.test_url }}"
          else
            TEST_URL="${{ secrets.TEST_ENV_URL }}"
          fi
          echo "Test Environment URL: $TEST_URL"
          echo "test_url=$TEST_URL" >> $GITHUB_OUTPUT

      - name: Verify Test Environment Availability
        run: |
          TEST_URL="${{ needs.deploy-to-test.outputs.test_url }}"
          for i in {1..30}; do
            if curl -f "$TEST_URL/health" 2>/dev/null || curl -f "$TEST_URL/" 2>/dev/null; then
              echo "✅ Test environment is accessible"
              exit 0
            fi
            echo "Waiting for test environment... (attempt $i/30)"
            sleep 10
          done
          echo "⚠️ Test environment may not be fully ready, but continuing with scans..."

  zap-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: deploy-to-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: ${{ needs.deploy-to-test.outputs.test_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          allow_issue_writing: false
        continue-on-error: true

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: ${{ needs.deploy-to-test.outputs.test_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

      - name: Upload OWASP ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-zap-report
          path: report_md.md
          retention-days: 30

  fail-on-critical:
    name: Fail on Critical OWASP ZAP Findings
    runs-on: ubuntu-latest
    needs: zap-scan
    if: always()

    steps:
      - name: Download ZAP Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: owasp-zap-report
          path: zap-report

      - name: Fail if High Severity Findings Exist
        run: |
          if [ -f zap-report/report_md.md ] && grep -qE "High|Critical" zap-report/report_md.md; then
            echo "❌ High or critical findings detected in the OWASP ZAP report."
            exit 1
          fi
          echo "✅ No high or critical findings detected in the OWASP ZAP report."
