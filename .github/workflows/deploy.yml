name: Full Stack EC2 Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    steps:
      # ---------------------------------------------------------
      # Checkout source code
      # ---------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Configure SSH
      # ---------------------------------------------------------
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # ---------------------------------------------------------
      # Deploy Application
      # ---------------------------------------------------------
      - name: Deploy Application
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'

            set -e

            # ---------------------------------------------------------
            # Directories
            # ---------------------------------------------------------
            BASE_DIR=/home/ec2-user
            REPO_DIR=$BASE_DIR/repo
            APP_DIR=$REPO_DIR/Application-Code

            echo "================================="
            echo "INSTALLING REQUIRED PACKAGES"
            echo "================================="

            sudo dnf update -y || true

            # ---------------------------------------------------------
            # Install Git
            # ---------------------------------------------------------
            if ! command -v git >/dev/null 2>&1; then
              sudo dnf install -y git
            fi

            # ---------------------------------------------------------
            # Install NodeJS
            # ---------------------------------------------------------
            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://rpm.nodesource.com/setup_18.x | sudo bash -
              sudo dnf install -y nodejs
            fi

            # ---------------------------------------------------------
            # Install PM2
            # ---------------------------------------------------------
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            # ---------------------------------------------------------
            # Install MongoDB
            # Amazon Linux 2023 Compatible
            # ---------------------------------------------------------
            if ! command -v mongod >/dev/null 2>&1; then

              sudo tee /etc/yum.repos.d/mongodb-org-7.0.repo > /dev/null << 'MONGOEOF'
          [mongodb-org-7.0]
          name=MongoDB Repository
          baseurl=https://repo.mongodb.org/yum/amazon/2023/mongodb-org/7.0/x86_64/
          gpgcheck=1
          enabled=1
          gpgkey=https://pgp.mongodb.com/server-7.0.asc
          MONGOEOF

              sudo dnf install -y mongodb-org

              sudo systemctl enable mongod
            fi

            sudo systemctl start mongod

            # ---------------------------------------------------------
            # Install Nginx
            # ---------------------------------------------------------
            if ! command -v nginx >/dev/null 2>&1; then
              sudo dnf install -y nginx

              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi

            echo "================================="
            echo "CLONING REPOSITORY"
            echo "================================="

            # ---------------------------------------------------------
            # Clone repository first time only
            # ---------------------------------------------------------
            if [ ! -d "$REPO_DIR" ]; then
              git clone https://${{ secrets.GIT_PAT }}@github.com/${{ github.repository }}.git $REPO_DIR
            fi

            cd $REPO_DIR

            git pull origin main

            echo "================================="
            echo "VERIFY PROJECT STRUCTURE"
            echo "================================="

            pwd

            ls -la
            ls -la $APP_DIR
            ls -la $APP_DIR/backend
            ls -la $APP_DIR/frontend

            # ---------------------------------------------------------
            # Backend Environment Variables
            # ---------------------------------------------------------
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > $APP_DIR/backend/.env
            echo "PORT=3500" >> $APP_DIR/backend/.env

            # ---------------------------------------------------------
            # Frontend Environment Variables
            # ---------------------------------------------------------
            echo "REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }}" > $APP_DIR/frontend/.env

            echo "================================="
            echo "BACKEND DEPLOYMENT"
            echo "================================="

            cd $APP_DIR/backend

            pwd
            ls -la

            npm install

            pm2 delete backend || true

            pm2 start index.js --name backend

            echo "================================="
            echo "FRONTEND DEPLOYMENT"
            echo "================================="

            cd $APP_DIR/frontend

            pwd
            ls -la

            npm install

            npm run build

            # ---------------------------------------------------------
            # Install serve package
            # ---------------------------------------------------------
            if ! command -v serve >/dev/null 2>&1; then
              sudo npm install -g serve
            fi

            pm2 delete frontend || true

            pm2 start "serve -s build -l 3000" --name frontend

            pm2 save

            echo "================================="
            echo "CONFIGURING NGINX"
            echo "================================="

            # ---------------------------------------------------------
            # Configure nginx
            # ---------------------------------------------------------
            sudo tee /etc/nginx/nginx.conf > /dev/null << 'NGINXEOF'
          user nginx;
          worker_processes auto;

          events {
            worker_connections 1024;
          }

          http {

            include /etc/nginx/mime.types;
            default_type application/octet-stream;

            sendfile on;

            upstream backend {
              server 127.0.0.1:3500;
            }

            upstream frontend {
              server 127.0.0.1:3000;
            }

            server {

              listen 80;

              location /api/ {
                proxy_pass http://backend/;
              }

              location / {
                proxy_pass http://frontend/;
              }
            }
          }
          NGINXEOF

            sudo nginx -t

            sudo systemctl restart nginx

            echo "================================="
            echo "DEPLOYMENT SUCCESSFUL"
            echo "================================="

          EOF