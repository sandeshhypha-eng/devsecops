name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:

  setup-mongodb:
    name: Setup MongoDB
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Install MongoDB on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'

            if ! command -v mongod >/dev/null 2>&1; then
              echo "Installing MongoDB..."

              sudo tee /etc/yum.repos.d/mongodb-org-6.0.repo > /dev/null << 'EOL'
[mongodb-org-6.0]
name=MongoDB Repository
baseurl=https://repo.mongodb.org/yum/amazon/2/mongodb-org/6.0/x86_64/
gpgcheck=1
enabled=1
gpgkey=https://www.mongodb.org/static/pgp/server-6.0.asc
EOL

              sudo yum install -y mongodb-org
              sudo systemctl enable mongod
            fi

            sudo systemctl start mongod
            sudo systemctl status mongod

          EOF

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: setup-mongodb

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy Backend to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'

            # Install Node.js
            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://rpm.nodesource.com/setup_18.x | sudo bash -
              sudo yum install -y nodejs
            fi

            # Install PM2
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            # Clone repository if missing
            if [ ! -d "/home/ec2-user/Application-Code" ]; then
              git clone https://github.com/your/repo.git /home/ec2-user/Application-Code
            fi

            cd /home/ec2-user/Application-Code

            git pull origin main

            # Backend ENV
            cat > backend/.env << EOL
MONGODB_URI=mongodb://localhost:27017/yourdbname
PORT=3500
EOL

            # Backend Setup
            cd backend
            npm install

            pm2 delete backend || true
            pm2 start index.js --name backend

            pm2 save

          EOF

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy Frontend to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'

            # Install serve package
            if ! command -v serve >/dev/null 2>&1; then
              sudo npm install -g serve
            fi

            cd /home/ec2-user/Application-Code

            git pull origin main

            # Frontend ENV
            cat > frontend/.env << EOL
REACT_APP_BACKEND_URL=http://${{ secrets.EC2_HOST }}:3500/api/tasks
EOL

            # Frontend Build
            cd frontend

            npm install
            npm run build

            pm2 delete frontend || true
            pm2 start "serve -s build -l 3000" --name frontend

            pm2 save

          EOF

  setup-nginx:
    name: Configure Nginx
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Configure Nginx on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'

            if ! command -v nginx >/dev/null 2>&1; then
              sudo yum install -y nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi

            sudo cp /home/ec2-user/Application-Code/nginx.conf /etc/nginx/nginx.conf

            sudo nginx -t

            sudo systemctl reload nginx

          EOF