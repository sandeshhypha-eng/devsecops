name: SAST Scan - SonarCloud Code Analysis

on:
  push:
    branches: [ main, develop, 'feature*' ]
    paths:
      - 'Application-Code/**'
      - '.github/workflows/sast-scan.yml'
  pull_request:
    branches: [ main, develop, 'feature*' ]
    paths:
      - 'Application-Code/**'
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  # ====================================================================
  # SONARCLOUD ANALYSIS
  # ====================================================================
  sonarcloud:
    name: SonarCloud - Code Quality & Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        working-directory: Application-Code/backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: Application-Code/frontend
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload SonarCloud Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonarcloud-report
          path: .scannerwork/
          retention-days: 30

  # ====================================================================
  # SAST REPORT SUMMARY
  # ====================================================================
  sast-report-summary:
    name: SAST Scan Summary
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate SAST Summary Report
        run: |
          echo "# 🔐 SAST (Static Application Security Testing) Summary Report" > sast-summary.md
          echo "" >> sast-summary.md
          echo "## Scan Timestamp" >> sast-summary.md
          echo "$(date)" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "## Scan Tool" >> sast-summary.md
          echo "- **SonarCloud** - Advanced static code analysis for code quality, security, and maintainability" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "## Coverage" >> sast-summary.md
          echo "- **Languages**: JavaScript (Backend & Frontend)" >> sast-summary.md
          echo "- **Analysis Types**: Code quality, security vulnerabilities, code smells, bugs" >> sast-summary.md
          echo "- **Standards**: OWASP Top 10, CWE" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "## Artifacts Generated" >> sast-summary.md
          echo "- sonarcloud-report/" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "View detailed results at: https://sonarcloud.io/projects" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "All scan analysis available in the Actions artifacts." >> sast-summary.md
          
          cat sast-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload SAST Summary
        uses: actions/upload-artifact@v4
        with:
          name: sast-scan-summary
          path: sast-summary.md
          retention-days: 30

  # ====================================================================
  # FAIL ON CRITICAL QUALITY GATE
  # ====================================================================
  fail-on-critical:
    name: Fail Pipeline on Quality Gate Issues
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    if: failure()

    steps:
      - name: Report Critical Issues
        run: |
          echo "❌ CRITICAL: SonarCloud scan detected critical issues!"
          echo ""
          echo "Please review the security findings in:"
          echo "  - SonarCloud project dashboard"
          echo "  - Actions artifacts (sonarcloud-report/)"
          echo ""
          echo "Action required: Fix critical issues before merging."
          exit 1
