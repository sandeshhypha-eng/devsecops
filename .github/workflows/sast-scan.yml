name: SAST Scan - Static Application Security Testing

on:
  push:
    branches: [ main, develop, 'feature*' ]
    paths:
      - 'Application-Code/**'
      - '.github/workflows/sast-scan.yml'
  pull_request:
    branches: [ main, develop, 'feature*' ]
    paths:
      - 'Application-Code/**'
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  # ====================================================================
  # CODEQL ANALYSIS
  # ====================================================================
  codeql-analyze:
    name: CodeQL - Code Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{ matrix.language }}"

  # ====================================================================
  # SEMGREP SAST SCANNING
  # ====================================================================
  semgrep:
    name: Semgrep - Code Pattern Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: true
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/nodejs
          generateSarifFile: semgrep-report.sarif

      - name: Upload Semgrep Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep-report.sarif
          category: semgrep

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.sarif
          retention-days: 30

  # ====================================================================
  # ESLINT - JAVASCRIPT LINTING & SECURITY
  # ====================================================================
  eslint-scan:
    name: ESLint - JavaScript Security Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend
            path: Application-Code/backend
          - name: Frontend
            path: Application-Code/frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.path }}/package-lock.json'

      - name: Install Dependencies - ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run ESLint - ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: |
          npx eslint . \
            --format json \
            --output-file eslint-report-${{ matrix.name }}.json \
            --max-warnings 0 || true
        continue-on-error: true

      - name: Display ESLint Results
        working-directory: ${{ matrix.path }}
        if: always()
        run: |
          if [ -f "eslint-report-${{ matrix.name }}.json" ]; then
            cat eslint-report-${{ matrix.name }}.json
          fi

      - name: Upload ESLint Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: eslint-report-${{ matrix.name }}
          path: ${{ matrix.path }}/eslint-report-${{ matrix.name }}.json
          retention-days: 30

  # ====================================================================
  # KICS - INFRASTRUCTURE CODE SCANNING
  # ====================================================================
  kics-scan:
    name: KICS - Infrastructure & Config Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run KICS Scan
        uses: Checkmarx/kics-action@master
        with:
          path: 'Application-Code'
          output_path: 'kics-results'
          output_formats: 'json,sarif'
          verbose: true

      - name: Upload KICS Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: kics-report
          path: kics-results/
          retention-days: 30

  # ====================================================================
  # DOCKERFILE SCANNING
  # ====================================================================
  dockerfile-scan:
    name: Trivy - Dockerfile & Container Security
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - path: Application-Code/backend/Dockerfile
            name: Backend-Dockerfile
          - path: Application-Code/frontend/Dockerfile
            name: Frontend-Dockerfile

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Scan - ${{ matrix.name }}
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: ${{ matrix.dockerfile.path }}
          format: 'sarif'
          output: 'trivy-${{ matrix.name }}.sarif'

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: trivy-report-${{ matrix.name }}
          path: trivy-${{ matrix.name }}.sarif
          retention-days: 30

  # ====================================================================
  # NGINX CONFIGURATION SCANNING
  # ====================================================================
  nginx-scan:
    name: Nginx Configuration Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Nginx Configuration
        run: |
          # Install nginx
          sudo apt-get update -qq
          sudo apt-get install -y nginx
          
          echo "========================================="
          echo "Validating Nginx Configuration"
          echo "========================================="
          
          # Test nginx config syntax
          sudo nginx -t -c $(pwd)/Application-Code/nginx.conf || {
            echo "❌ Nginx configuration has syntax errors"
            exit 1
          }
          
          echo "✅ Nginx configuration is valid"

      - name: Security Analysis - Nginx Config
        run: |
          echo "========================================="
          echo "Nginx Security Configuration Checks"
          echo "========================================="
          
          CONFIG_FILE="Application-Code/nginx.conf"
          
          # Check for security headers
          echo "Checking for security headers..."
          grep -q "add_header X-Frame-Options" "$CONFIG_FILE" && echo "✓ X-Frame-Options header found" || echo "⚠ X-Frame-Options header missing"
          grep -q "add_header X-Content-Type-Options" "$CONFIG_FILE" && echo "✓ X-Content-Type-Options header found" || echo "⚠ X-Content-Type-Options header missing"
          grep -q "add_header X-XSS-Protection" "$CONFIG_FILE" && echo "✓ X-XSS-Protection header found" || echo "⚠ X-XSS-Protection header missing"
          grep -q "add_header Strict-Transport-Security" "$CONFIG_FILE" && echo "✓ HSTS header found" || echo "⚠ HSTS header missing"
          
          echo ""
          echo "✅ Nginx configuration audit complete"

  # ====================================================================
  # SAST REPORT SUMMARY
  # ====================================================================
  sast-report-summary:
    name: SAST Scan Summary
    runs-on: ubuntu-latest
    needs: [codeql-analyze, semgrep, eslint-scan, kics-scan, dockerfile-scan, nginx-scan]
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v3

      - name: Generate SAST Summary Report
        run: |
          echo "# 🔐 SAST (Static Application Security Testing) Summary Report" > sast-summary.md
          echo "" >> sast-summary.md
          echo "## Scan Timestamp" >> sast-summary.md
          echo "$(date)" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "## Scans Performed" >> sast-summary.md
          echo "1. **CodeQL** - GitHub native code analysis for JavaScript" >> sast-summary.md
          echo "2. **Semgrep** - Pattern-based security scanning (OWASP Top 10, CWE Top 25)" >> sast-summary.md
          echo "3. **ESLint** - JavaScript linting with security rules (Backend & Frontend)" >> sast-summary.md
          echo "4. **KICS** - Infrastructure & configuration security scanning" >> sast-summary.md
          echo "5. **Trivy** - Container & Dockerfile security analysis" >> sast-summary.md
          echo "6. **Nginx** - Web server configuration validation and security checks" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "## Coverage" >> sast-summary.md
          echo "- **Source Code**: Backend (Node.js) and Frontend (React)" >> sast-summary.md
          echo "- **Infrastructure**: Nginx configuration, Dockerfiles" >> sast-summary.md
          echo "- **Security Standards**: OWASP Top 10, CWE-25" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "## Artifacts Generated" >> sast-summary.md
          echo "- codeql-results/" >> sast-summary.md
          echo "- semgrep-report.sarif" >> sast-summary.md
          echo "- eslint-report-*.json" >> sast-summary.md
          echo "- kics-results/" >> sast-summary.md
          echo "- trivy-*.sarif" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "## GitHub Security Integration" >> sast-summary.md
          echo "Results are automatically uploaded to GitHub Security tab for:" >> sast-summary.md
          echo "- CodeQL analysis" >> sast-summary.md
          echo "- Semgrep findings" >> sast-summary.md
          echo "- Trivy scan results" >> sast-summary.md
          echo "" >> sast-summary.md
          
          echo "All reports are available in the Actions artifacts for detailed review." >> sast-summary.md
          
          cat sast-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload SAST Summary
        uses: actions/upload-artifact@v3
        with:
          name: sast-scan-summary
          path: sast-summary.md
          retention-days: 30

  # ====================================================================
  # FAIL ON CRITICAL VULNERABILITIES
  # ====================================================================
  fail-on-critical:
    name: Fail Pipeline on Critical Issues
    runs-on: ubuntu-latest
    needs: [codeql-analyze, semgrep, eslint-scan, kics-scan, dockerfile-scan, nginx-scan]
    if: failure()

    steps:
      - name: Report Critical Security Issues
        run: |
          echo "❌ CRITICAL: SAST scan detected security vulnerabilities!"
          echo ""
          echo "Please review the security findings in:"
          echo "  - GitHub Security tab (CodeQL, Semgrep, Trivy)"
          echo "  - Actions artifacts (detailed reports)"
          echo ""
          echo "Action required: Fix security issues before merging."
          exit 1
