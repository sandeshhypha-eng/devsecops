name: SCA Scan - Snyk Vulnerability Analysis

on:
  push:
    branches: [ main, develop, 'feature*' ]
    paths:
      - 'Application-Code/backend/package.json'
      - 'Application-Code/backend/package-lock.json'
      - 'Application-Code/frontend/package.json'
      - 'Application-Code/frontend/package-lock.json'
      - '.github/workflows/sca-scan.yml'
  pull_request:
    branches: [ main, develop, 'feature*' ]
    paths:
      - 'Application-Code/backend/package.json'
      - 'Application-Code/backend/package-lock.json'
      - 'Application-Code/frontend/package.json'
      - 'Application-Code/frontend/package-lock.json'
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ====================================================================
  # SNYK VULNERABILITY SCANNING
  # ====================================================================
  snyk-scan:
    name: Snyk - Open Source Vulnerability Scan
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend
            path: Application-Code/backend
          - name: Frontend
            path: Application-Code/frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies - ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: npm ci
        continue-on-error: true

      - name: Run Snyk Scan - ${{ matrix.name }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report-${{ matrix.name }}.json
          working-directory: ${{ matrix.path }}
        continue-on-error: true

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ matrix.name }}
          path: ${{ matrix.path }}/snyk-report-${{ matrix.name }}.json
          retention-days: 30

  # ====================================================================
  # REPORT SUMMARY
  # ====================================================================
  sca-report-summary:
    name: SCA Scan Summary
    runs-on: ubuntu-latest
    needs: [snyk-scan]
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate SCA Summary Report
        run: |
          echo "# 📊 SCA Scan Summary Report" > sca-summary.md
          echo "" >> sca-summary.md
          echo "## Scan Timestamp" >> sca-summary.md
          echo "$(date)" >> sca-summary.md
          echo "" >> sca-summary.md
          
          echo "## Scan Tool" >> sca-summary.md
          echo "- **Snyk**: Comprehensive open-source vulnerability detection for Backend and Frontend dependencies" >> sca-summary.md
          echo "" >> sca-summary.md
          
          echo "## Coverage" >> sca-summary.md
          echo "- **Backend**: Application-Code/backend" >> sca-summary.md
          echo "- **Frontend**: Application-Code/frontend" >> sca-summary.md
          echo "- **Severity Threshold**: High and Critical vulnerabilities" >> sca-summary.md
          echo "" >> sca-summary.md
          
          echo "## Artifacts Generated" >> sca-summary.md
          echo "- snyk-report-Backend.json" >> sca-summary.md
          echo "- snyk-report-Frontend.json" >> sca-summary.md
          echo "" >> sca-summary.md
          
          echo "All reports are available in the Actions artifacts." >> sca-summary.md
          
          cat sca-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload SCA Summary
        uses: actions/upload-artifact@v4
        with:
          name: sca-scan-summary
          path: sca-summary.md
          retention-days: 30

  # ====================================================================
  # FAIL ON CRITICAL VULNERABILITIES
  # ====================================================================
  fail-on-critical:
    name: Fail Pipeline on Critical Issues
    runs-on: ubuntu-latest
    needs: [snyk-scan]
    if: failure()

    steps:
      - name: Report Critical Vulnerabilities
        run: |
          echo "❌ CRITICAL: Snyk scan detected vulnerabilities!"
          echo ""
          echo "Please review the scan reports in the artifacts:"
          echo "  - snyk-report-Backend.json"
          echo "  - snyk-report-Frontend.json"
          echo ""
          echo "Action required: Fix vulnerabilities before merging."
          exit 1
